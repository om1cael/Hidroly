name: D-Man

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Java Setup
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      
      - name: Flutter Setup
        uses: kuhnroyal/flutter-fvm-config-action/config@v3
        id: fvm-config-action

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
          cache: true
      
      - name: Get Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
      
      - name: Install Dependencies
        run: flutter pub get
      
      - name: Generate Code
        run: dart run build_runner build --delete-conflicting-outputs
      
      - name: Build APKs
        run: flutter build apk --flavor default --release  && flutter build apk --flavor fdroid --release
        env:
          KEYSTORE_PATH: "upload-keystore.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/app/outputs/flutter-apk/app-default-release.apk
            build/app/outputs/flutter-apk/app-fdroid-release.apk